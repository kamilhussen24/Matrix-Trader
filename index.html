<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Join Now Today</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Meta Pixel Code -->
    <script>
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', 'YOUR_PIXEL_ID_HERE'); // 🔴 এখানে তোমার আসল Pixel ID বসাও
        fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
        src="https://www.facebook.com/tr?id=YOUR_PIXEL_ID_HERE&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code -->

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f6f4ef;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.4;
        }

        .main {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 24px;
            margin-top: 24px;
            padding: 28px 0 26px 0;
            text-align: center;
            box-shadow: 0 2px 18px rgba(20, 30, 45, 0.06);
        }

        .pointer-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 0 0 18px 0;
            animation: fingerBounce 0.8s ease-in-out infinite;
        }

        .pointer-icon i {
            font-size: 1.8rem;
            color: #1a7f5a;
        }

        @keyframes fingerBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .join-btn {
            background: linear-gradient(135deg, #229ED9 0%, #37AEE2 100%);
            border: none;
            padding: 14px 30px;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.35rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            min-width: 220px;
            margin: 0 0 18px 0;
            transition: all 0.2s ease;
            animation: btnGlowPulse 1.5s ease-in-out infinite;
            text-decoration: none;
        }

        .join-btn i { font-size: 1.4rem; }

        .join-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(26, 127, 90, 0.6);
        }

        .join-btn:active {
            transform: scale(0.97);
            transition: 0.05s;
        }

        @keyframes btnGlowPulse {
            0% { box-shadow: 0 0 0 0 rgba(26, 127, 90, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(26, 127, 90, 0); }
            100% { box-shadow: 0 0 0 0 rgba(26, 127, 90, 0); }
        }

        .group-title {
            font-size: 1.7rem;
            font-weight: 800;
            color: #0f1a14;
            margin: 6px 0 8px 0;
            letter-spacing: -0.3px;
        }

        .member-badge {
            background: #eef6f1;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1a3a2a;
            margin-bottom: 22px;
        }

        .member-badge i { color: #1a7f5a; }

        .features {
            background: #f6faf7;
            border-radius: 24px;
            padding: 20px 16px;
            margin: 14px 0 22px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px 12px;
        }

        .feat-item {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e293b;
        }

        .feat-item i {
            font-size: 1.15rem;
            color: #1a7f5a;
            background: #ffffff;
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .feat-item span {
            display: inline-block;
            text-align: left;
            line-height: 1.3;
        }
    </style>
</head>
<body>
<div class="main">
    <div class="card">
        <div class="pointer-icon">
            <i class="fas fa-hand-point-down"></i>
        </div>

        <!-- 🔴 href-এ আসল Telegram invite link বসাও -->
        <a id="joinTelegramBtn" class="join-btn" href="https://t.me/YOUR_INVITE_LINK_HERE" target="_blank" rel="noopener">
            <i class="fab fa-telegram-plane"></i> জয়েন গ্রুপ
        </a>

        <div class="group-title">
            Matrix Trader
        </div>
        <!-- 🔴 সত্যিকারের মেম্বার সংখ্যা বসাও, ফলস ক্লেইম দিলে অ্যাড রিভিউ রিজেক্ট হতে পারে -->
        <div class="member-badge">
            <i class="fas fa-users"></i> ২৫,২০০+ সদস্য
        </div>

        <div class="features">
            <div class="feat-item">
                <i class="fas fa-chart-line"></i>
                <span>মার্কেট আপডেট</span>
            </div>
            <div class="feat-item">
                <i class="fas fa-clock"></i>
                <span>২৪/৭ কমিউনিটি</span>
            </div>
            <div class="feat-item">
                <i class="fas fa-lock"></i>
                <span>প্রাইভেট গ্রুপ</span>
            </div>
            <div class="feat-item">
                <i class="fas fa-gem"></i>
                <span>ডেইলি ডিসকাশন</span>
            </div>
        </div>
    </div>
</div>

<script>
// 🔴 এখানে true/false বদলে Purchase ইভেন্ট চালু/বন্ধ করো
const TRACK_PURCHASE = true; // true = ইভেন্ট চালু, false = বন্ধ

(function() {
    const btn = document.getElementById('joinTelegramBtn');
    if (!btn) return;

    // বাটনে ক্লিক করলে Purchase ইভেন্ট ফায়ার হবে, তারপর Telegram-এ যাবে
    btn.addEventListener('click', function(e) {
        if (TRACK_PURCHASE && typeof fbq === 'function') {
            fbq('track', 'Purchase', {
                currency: 'BDT',
                value: 100
            });
        }
        // link href দিয়ে স্বাভাবিকভাবেই নতুন ট্যাবে খুলবে, popup block-এর ঝামেলা নেই
    });
})();
</script>
</body>
</html>
